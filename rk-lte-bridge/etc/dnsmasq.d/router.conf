# DHCP/DNS for the Pi-to-USG WAN link (192.168.50.0/24).
# bind-dynamic + listen-address keeps dnsmasq glued to 192.168.50.1 only;
# no "interface=" so it does not accidentally bind every eth0 IP.
bind-dynamic
listen-address=192.168.50.1
domain-needed
bogus-priv
dhcp-range=192.168.50.10,192.168.50.50,255.255.255.0,12h
dhcp-option=option:router,192.168.50.1
dhcp-option=option:dns-server,192.168.50.1
